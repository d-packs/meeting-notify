# meeting-notify configuration.
#
# Lives at ~/.config/meeting-notify/config.ini (the installer copies this
# template there if you don't already have one). Every setting is optional —
# uncomment a line and edit it to override the built-in default shown.

[meeting-notify]
# The "imminent" lead, in minutes. The urgent alert fires this far before a
# meeting; the live "Meeting starts in: M:SS" countdown runs from here down to
# 0; and the popup fades at meeting start. It's also the floor — reminders you
# set closer than this (e.g. "at start" = 0 min) are pulled up to it.
#imminent_minutes = 2

# How far ahead to scan the calendar, in hours. Must exceed your longest
# reminder (so e.g. a 2-hour reminder is seen in time).
#window_hours = 26

# How often to actually query Google's API, in minutes. The timer still runs
# every minute (so reminders stay minute-accurate); between fetches it reads a
# local cache. A failed fetch reuses the last cache, so reminders for meetings
# already fetched keep firing even with no network.
#poll_interval_minutes = 5

# Skip meetings you've declined (true / false).
#skip_declined = true

# If the Google sign-in breaks, re-nag at most this often during a session, in
# seconds. The login-time check always fires regardless, so each restart
# re-alerts until you re-authorize.
#auth_alert_throttle_seconds = 14400

# Notification app name (the header shown on the popup).
#app_name = Meeting Reminder

# Themed icon name for the popup.
#icon = appointment-soon

# How to open a meeting's link when you click "Join". Default opens your
# system browser. For the Google Meet PWA (Chromium installed app), e.g.:
#meet_opener = /usr/bin/chromium --profile-directory=Default --app-id=<app-id>
#meet_opener = xdg-open

[sounds]
# Use your own alert sounds: absolute paths to any .ogg/.wav files. Leave blank
# (or commented) to use the bundled sounds.
#heads_up = /home/you/.local/share/sounds/my-heads-up.ogg
#imminent = /home/you/.local/share/sounds/my-imminent.ogg
